<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" preserveAspectRatio="xMidYMid meet">
  <!-- Icon mark: stylized geometric "G" — top half-disc + lower quarter + vertical bar -->
  <g transform="translate(14, 18)" fill="#000">
    <!-- Top large semicircle (flat edge at bottom) -->
    <path d="M 0 70 A 65 65 0 0 1 130 70 Z"/>
    <!-- Lower-right quarter-disc -->
    <path d="M 65 70 A 45 45 0 0 1 110 115 L 65 115 Z"/>
    <!-- Vertical bar -->
    <rect x="58" y="70" width="22" height="78"/>
  </g>

  <!-- Wordmark -->
  <text x="178" y="125"
        font-family="'Space Grotesk', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="400"
        font-size="100"
        letter-spacing="-3"
        fill="#000">Operai</text>
</svg>
